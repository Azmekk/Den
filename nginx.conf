events {
    worker_connections 1024;
}

http {
    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile    on;
    tcp_nopush  on;

    # Gzip compression for text responses
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   256;
    gzip_comp_level   4;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Upload size limit (images + videos)
    client_max_body_size 50m;

    upstream app {
        server app:8080;
    }

    server {
        listen 80;

        # Trust X-Forwarded-* headers from the outer TLS-terminating proxy
        set_real_ip_from  0.0.0.0/0;
        real_ip_header    X-Forwarded-For;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "DENY"          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # WebSocket endpoint — must be matched before the general /api block
        location /api/ws {
            proxy_pass          http://app;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade          $http_upgrade;
            proxy_set_header    Connection       "upgrade";
            proxy_set_header    Host             $host;
            proxy_set_header    X-Real-IP        $remote_addr;
            proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;

            # Keep WebSocket connections alive
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # API and all other requests proxied to the Go app
        location / {
            proxy_pass          http://app;
            proxy_set_header    Host             $host;
            proxy_set_header    X-Real-IP        $remote_addr;
            proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
        }
    }
}
