name: Desktop Releases

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_args: --linux
          - os: windows-latest
            build_args: --win
          - os: macos-latest
            build_args: --mac
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - run: npm install

      - name: Build
        run: npx electron-builder ${{ matrix.build_args }} --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            src/desktop/build/*.exe
            src/desktop/build/*.dmg
            src/desktop/build/*.zip
            src/desktop/build/*.AppImage
            src/desktop/build/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
