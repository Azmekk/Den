<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Den — Connect to Server</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src *;">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: hsl(240 10% 3.9%);
      color: hsl(0 0% 98%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-app-region: drag;
    }

    .container {
      -webkit-app-region: no-drag;
      text-align: center;
      max-width: 400px;
      width: 100%;
      padding: 2rem;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: hsl(240 5% 64.9%);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: hsl(240 10% 5.5%);
      border: 1px solid hsl(240 3.7% 15.9%);
      border-radius: 0.5rem;
      color: hsl(0 0% 98%);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: hsl(240 5% 45%); }
    input:focus { border-color: hsl(231 77% 60%); }

    button {
      width: 100%;
      padding: 0.75rem 1rem;
      background: hsl(231 77% 60%);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .spinner.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      color: hsl(0 62.8% 50.6%);
      font-size: 0.85rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="icons/icon.png" alt="Den" />
    <h1>Connect to Server</h1>
    <p class="subtitle">Enter the URL of your Den server to get started</p>
    <form class="input-group" id="connectForm">
      <input
        type="url"
        id="urlInput"
        placeholder="https://den.example.com"
        autocomplete="url"
        required
        autofocus
      />
      <button type="submit" id="connectBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Connect</span>
      </button>
    </form>
    <p class="error" id="error"></p>
  </div>

  <script>
    const form = document.getElementById('connectForm');
    const urlInput = document.getElementById('urlInput');
    const connectBtn = document.getElementById('connectBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const error = document.getElementById('error');

    function setLoading(loading) {
      connectBtn.disabled = loading;
      spinner.classList.toggle('visible', loading);
      btnText.textContent = loading ? 'Connecting...' : 'Connect';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.textContent = '';

      let url = urlInput.value.trim();
      if (!url) return;

      // Normalize URL
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      url = url.replace(/\/+$/, '');

      setLoading(true);
      window.denDesktop.submitServerUrl(url);
    });

    window.denDesktop.onUrlValidation((result) => {
      setLoading(false);
      if (!result.success) {
        error.textContent = result.error || 'Could not connect to server';
      }
      // On success, main process handles navigation
    });

    if (window.denDesktop.onAutoReconnect) {
      window.denDesktop.onAutoReconnect((data) => {
        if (data.status === 'connecting') {
          urlInput.value = data.url;
          setLoading(true);
          btnText.textContent = 'Reconnecting...';
          error.textContent = '';
        } else if (data.status === 'failed') {
          setLoading(false);
          urlInput.value = data.url;
          error.textContent = data.error || 'Could not reconnect to server';
        }
      });
    }
  </script>
</body>
</html>
